<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff & Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .admin-section { border-top: 4px solid #ef4444; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: #dcfce7; color: #166534; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .flex { display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section" class="card">
        <h2>Staff Portal</h2>
        <div id="reg-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-bank" placeholder="Bank Name">
            <input type="text" id="reg-account" placeholder="Account Number">
            <input type="file" id="reg-avatar" accept="image/*">
        </div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="auth-btn">Login</button>
        <p onclick="toggleAuth()" style="text-align:center; cursor:pointer; color:blue;">New staff? Register</p>
    </div>

    <div id="staff-dashboard" class="hidden">
        <div class="card flex">
            <img id="user-img" class="avatar" src="">
            <h2 id="welcome-txt">Welcome!</h2>
            <button onclick="logout()" style="width:auto; background:#64748b;">Logout</button>
        </div>

        <div class="card">
            <h3>Daily Attendance</h3>
            <button onclick="markAttendance()" style="background:var(--success)">Mark Present Today</button>
            <p id="att-msg" style="color:green; font-weight:bold;"></p>
        </div>
    </div>

    <div id="admin-panel" class="card admin-section hidden">
        <h2>Admin Payroll & Attendance</h2>
        <div id="admin-data">Loading staff info...</div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');
    let isReg = false;

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('auth-btn').innerText = isReg ? 'Register' : 'Login';
    }

    // AUTH LOGIC
    document.getElementById('auth-btn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (isReg) {
            const name = document.getElementById('reg-name').value;
            const bank = document.getElementById('reg-bank').value;
            const acc = document.getElementById('reg-account').value;
            const file = document.getElementById('reg-avatar').files[0];

            const { data, error } = await _supabase.auth.signUp({ email, password });
            if (error) return alert(error.message);

            let imgUrl = '';
            if (file) {
                const path = `avatars/${data.user.id}`;
                await _supabase.storage.from('avatars').upload(path, file);
                imgUrl = _supabase.storage.from('avatars').getPublicUrl(path).data.publicUrl;
            }

            await _supabase.from('profiles').insert([{ 
                id: data.user.id, full_name: name, bank_name: bank, account_number: acc, avatar_url: imgUrl 
            }]);
            alert("Registered!");
        } else {
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }
    };

    async function loadData(user) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('staff-dashboard').classList.remove('hidden');

        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
        document.getElementById('welcome-txt').innerText = `Hello, ${profile.full_name}`;
        document.getElementById('user-img').src = profile.avatar_url || 'https://via.placeholder.com/50';

        // Show Admin Panel if admin
        if (user.email === 'admin@company.com') { // Change this to your admin email
            document.getElementById('admin-panel').classList.remove('hidden');
            loadAdminData();
        }
    }

    async function markAttendance() {
        const user = (await _supabase.auth.getUser()).data.user;
        const { data: profile } = await _supabase.from('profiles').select('full_name').eq('id', user.id).single();
        
        const { error } = await _supabase.from('attendance').insert([{ 
            user_id: user.id, full_name: profile.full_name 
        }]);
        
        if (error) alert("Already marked or error");
        else document.getElementById('att-msg').innerText = "✅ Attendance recorded for today!";
    }

    async function loadAdminData() {
        const { data: profiles } = await _supabase.from('profiles').select('*');
        const { data: att } = await _supabase.from('attendance').select('*');

        let html = '';
        profiles.forEach(p => {
            const days = att.filter(a => a.user_id === p.id).length;
            html += `
                <div style="border-bottom:1px solid #eee; padding:10px 0;">
                    <strong>${p.full_name}</strong><br>
                    🏦 ${p.bank_name} - ${p.account_number}<br>
                    📅 Attendance: ${days} days present<br>
                    <button onclick="payStaff('${p.full_name}')" style="background:#22c55e; width:auto; padding:5px 10px;">Confirm Payment</button>
                </div>
            `;
        });
        document.getElementById('admin-data').innerHTML = html;
    }

    function payStaff(name) { alert(`Payment processing for ${name}. Check your banking app to finalize.`); }

    function logout() { _supabase.auth.signOut(); location.reload(); }

    _supabase.auth.onAuthStateChange((ev, session) => {
        if (session) loadData(session.user);
    });
</script>

</body>
</html>
