<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONQUEST | Staff Portal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f5f5f5;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .portal-container {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--glass);
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
        }

        .logo-small { width: 60px; display: block; margin: 0 auto 20px; }
        
        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold); 
            text-align: center; 
            margin-bottom: 30px; 
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--gold); }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        input[type="file"] {
            padding: 8px;
            font-size: 0.8rem;
        }

        input:focus, textarea:focus { border-color: var(--gold); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover { background: #b8952e; transform: translateY(-2px); }

        .admin-note {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

<div class="portal-container">
    <img src="logo 1.png" class="logo-small" alt="Conquest">
    <h2>Staff Onboarding</h2>
    
    <form action="https://formspree.io/f/xlgpbqgp" method="POST" enctype="multipart/form-data">
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>
            <div class="form-group">
                <label>Year Joined Conquest</label>
                <input type="number" name="year_joined" min="2000" max="2099" placeholder="YYYY" required>
            </div>
        </div>

        <div class="form-group">
            <label>Upload Staff Picture</label>
            <input type="file" name="staff_picture" accept="image/*">
        </div>

        <div class="form-group">
            <label>Account Number (For Payments)</label>
            <input type="text" name="account_number" placeholder="Enter bank account details e.g bank name, account no., and account name." required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="phone number" name="Phone number" placeholder="Phone Number" required>
        </div>


        <div class="form-group">
            <label>Department</label>
            <select name="department">
                <option value="Visuals">Conquest Visuals</option>
                <option value="Prints">Conquest Prints</option>
                <option value="Interiors">Conquest Interiors</option>
            </select>
        </div>

        <div class="form-group">
            <label>Why did you join Conquest?</label>
            <textarea name="reason_for_joining" rows="3" placeholder="Tell us about your motivation..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit to Management</button>
    </form>

    <p class="admin-note">Private & Confidential: Conquest Artz & Design Management Only</p>
</div>

</body>
</html>
